name: AgentStreemr

options:
  bundleIdPrefix: com.eetr
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug

packages:
  AgentStreemrSwift:
    path: ../../agent-streemr-swift

  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

targets:
  AgentStreemr:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eetr.agent-streemr
        TARGETED_DEVICE_FAMILY: "2"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Supporting Files/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: AgentStreemrSwift
      - package: MarkdownUI
        product: MarkdownUI
    info:
      path: Supporting Files/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
